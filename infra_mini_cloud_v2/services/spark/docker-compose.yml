services:
  spark-master:
    image: spark-master:dev
    container_name: spark-master
    user: "0:0"
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    ports:
      - "7077:7077"
      - "8088:8080"
    volumes:
      #- ./scripts:/tmp/spark-shared
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
      #- ./local-data:/home/jovyan/local-data
      #- ../../data/warehouse:/user/hive/warehouse
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - spark-net
      - rust-net

  spark-worker-1:
    image: spark-master:dev
    container_name: spark-worker-1
    user: "0:0"
    command: ["/bin/bash", "-c", "sleep 10 && tini -- spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"]
    restart: always
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      #- ./scripts:/tmp/spark-shared
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
      #- ./local-data:/home/jovyan/local-data
      #- ../../data/warehouse:/user/hive/warehouse
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - spark-net
      - rust-net

  spark-worker-2:
    image: spark-master:dev
    container_name: spark-worker-2
    user: "0:0"
    command: ["/bin/bash", "-c", "sleep 10 && tini -- spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"]
    restart: always
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      #- ./scripts:/tmp/spark-shared
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
      #- ./local-data:/home/jovyan/local-data
      #- ../../data/warehouse:/user/hive/warehouse
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - spark-net
      - rust-net

networks:
  spark-net:
    external: true
  rust-net:
    external: true

volumes:
  spark-shared:
  shared-data:
